name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Unit + Spring slice + integration tests (incl. Testcontainers Postgres) for every service.
  test:
    name: Build & test (mvn verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run the full test pyramid
        run: ./mvnw -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/*-reports/*.xml'
          if-no-files-found: ignore

  # Boot the whole stack with docker compose and run the cross-service E2E tests.
  e2e:
    name: End-to-end (docker compose)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/movies/get-genres \
               && curl -sf http://localhost:8082/rental/getAllRentals \
               && curl -sf http://localhost:8080/customer/get-all-customers; then
              echo "services are up"; exit 0
            fi
            sleep 3
          done
          echo "services did not become ready"; docker compose logs; exit 1

      - name: Run E2E tests
        run: ./mvnw -B -Pe2e -pl e2e-tests verify

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
