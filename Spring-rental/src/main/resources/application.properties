spring.application.name=rental-service
server.port=8082

# Each microservice owns its own database (legacy shared ./Database collided).
spring.datasource.url=jdbc:h2:mem:rentaldb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Downstream microservice. Overridden in Docker (compose) and in tests (WireMock).
customer.service.url=http://localhost:8080
