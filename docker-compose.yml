# One-command local deployment of the whole movie-rental system:
#   docker compose up --build
#
# Browser -> frontend (8088) and the three services on their host ports.
# Server-to-server: rental-service calls customer-service over the compose network.
services:
  customer-service:
    build: ./Spring-Customer
    # Host port overridable to avoid local clashes; container port is always 8080.
    ports:
      - "${CUSTOMER_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/customer/get-all-customers"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  movies-service:
    build: ./Spring-movies
    ports:
      - "8081:8081"

  rental-service:
    build: ./Spring-rental
    ports:
      - "8082:8082"
    environment:
      # In-cluster DNS name of the customer-service container.
      CUSTOMER_SERVICE_URL: http://customer-service:8080
    depends_on:
      customer-service:
        condition: service_healthy

  frontend:
    build: ./Spring-frontendVue
    ports:
      - "8088:80"
    depends_on:
      - customer-service
      - movies-service
      - rental-service
